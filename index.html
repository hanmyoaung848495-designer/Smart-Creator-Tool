<!DOCTYPE html>
<html lang="en" class="no-scrollbar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon.svg">
    <title>Smart Creator Tools - AI Power for Creators</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32' width='32' height='32'><rect width='32' height='32' rx='10' fill='white'/><rect x='4' y='4' width='24' height='24' rx='8' fill='%23FF0000'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' font-family='sans-serif' font-weight='bold' font-size='16' fill='%23FFD700'>$</text></svg>">
    <link rel="manifest" href="/manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Myanmar:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Noto Sans Myanmar', sans-serif; }
        .marquee {
            display: flex;
            overflow: hidden;
            user-select: none;
            gap: 2rem;
        }
        .marquee-content {
            flex-shrink: 0;
            display: flex;
            justify-content: space-around;
            min-width: 100%;
            gap: 2rem;
            animation: scroll 40s linear infinite;
        }
        @keyframes scroll {
            from { transform: translateX(0); }
            to { transform: translateX(-100%); }
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .subtle-scrollbar::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        .subtle-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .subtle-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
        }
        .subtle-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        .subtle-scrollbar {
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.15) transparent;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "path": "https://esm.sh/path@^0.12.7",
    "vite": "https://esm.sh/vite@^7.3.0",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(registration => {
            console.log('SW registered: ', registration);
          }).catch(registrationError => {
            console.log('SW registration failed: ', registrationError);
          });
        });
      }
    </script>
    <script>
      (function() {
        const saved = localStorage.getItem('theme');
        const isDark = saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (isDark) {
          document.documentElement.classList.add('dark');
          const loader = document.getElementById('initial-loader');
          if (loader) {
            loader.style.backgroundColor = '#0f172a';
            loader.querySelector('h1').style.color = '#f8fafc';
            const iconBox = loader.querySelector('div:first-child');
            if (iconBox) {
              iconBox.style.backgroundColor = '#1e293b';
              iconBox.style.borderColor = '#334155';
            }
          }
        }
      })();
    </script>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 no-scrollbar">
    <div id="root">
        <div id="initial-loader" style="position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: #f8fafc; z-index: 9999; font-family: 'Inter', sans-serif;">
            <div style="width: 80px; height: 80px; background-color: white; border-radius: 20px; display: flex; align-items: center; justify-content: center; padding: 12px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); border: 1px solid #e2e8f0;">
                <div style="width: 100%; height: 100%; background-color: #FF0000; border-radius: 10px; display: flex; align-items: center; justify-content: center;">
                    <span style="font-weight: 900; font-size: 36px; color: #FFD700; line-height: 1;">$</span>
                </div>
            </div>
            <h1 style="margin-top: 20px; font-weight: 900; font-size: 28px; color: #0f172a; letter-spacing: -0.05em;">Smart Creator</h1>
            <div style="margin-top: 4px; text-align: center;">
                <p style="margin: 0; font-size: 10px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.2em;">Designed and Developed</p>
                <p style="margin: 0; font-size: 12px; font-weight: 900; color: #4f46e5; text-transform: uppercase; letter-spacing: 0.1em;">By KC Team</p>
            </div>
            <div style="margin-top: 12px; display: flex; gap: 4px;">
                <div class="dot" style="width: 8px; height: 8px; background-color: #4f46e5; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both;"></div>
                <div class="dot" style="width: 8px; height: 8px; background-color: #4f46e5; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; animation-delay: -0.32s;"></div>
                <div class="dot" style="width: 8px; height: 8px; background-color: #4f46e5; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; animation-delay: -0.16s;"></div>
            </div>
            <style>
                @keyframes bounce {
                    0%, 80%, 100% { transform: scale(0); }
                    40% { transform: scale(1.0); }
                }
                @media (prefers-color-scheme: dark) {
                    #initial-loader { background-color: #0f172a !important; }
                    #initial-loader h1 { color: #f8fafc !important; }
                    #initial-loader > div:first-child { background-color: #1e293b !important; border-color: #334155 !important; }
                }
            </style>
        </div>
    </div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
